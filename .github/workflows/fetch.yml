name: Fetch LHB Data

on:
  schedule:
    - cron: '10 9 * * 1-5'  # 北京时间 17:10，周一到周五
    - cron: '0 10 * * 1-5'  # 北京时间 18:00，周一到周五
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests jinja2

      - run: python scraper.py
        env:
          DXX_USERNAME: ${{ secrets.DXX_USERNAME }}
          DXX_PASSWORD: ${{ secrets.DXX_PASSWORD }}

      - name: Render index.html
        run: |
          python - <<'EOF'
          import json
          from jinja2 import Environment, FileSystemLoader
          with open("data/data.json", encoding="utf-8") as f:
              d = json.load(f)
          env = Environment(loader=FileSystemLoader("templates"))
          html = env.get_template("index.html").render(
              updated_at=d["updated_at"],
              data=d["data"],
              trading_days=d["trading_days"],
              jjyd=d.get("jjyd", []),
              top_volume=d.get("top_volume", []),
              capital_signals=d.get("capital_signals", {}),
          )
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)
          EOF

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/data.json index.html
          git diff --cached --quiet || git commit -m "update data $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: Deploy to main
        run: |
          git fetch origin main
          git checkout main
          git checkout dev -- index.html
          git diff --cached --quiet || git commit -m "deploy $(date '+%Y-%m-%d %H:%M')"
          git push origin main
