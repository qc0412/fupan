name: Fetch LHB Data

on:
  schedule:
    - cron: '0 10 * * 1-5'  # 北京时间 18:00，周一到周五
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python scraper.py
        env:
          DXX_USERNAME: ${{ secrets.DXX_USERNAME }}
          DXX_PASSWORD: ${{ secrets.DXX_PASSWORD }}

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/data.json
          git diff --cached --quiet || git commit -m "update data $(date '+%Y-%m-%d %H:%M')"
          git push
