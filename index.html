<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短线龙头复盘</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }

  .main { max-width: 960px; margin: 16px auto; padding: 0 12px 32px; }

  .tabs { display: flex; align-items: center; background: #fff; border-radius: 999px; padding: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 14px; }
  .tab { flex: 1; text-align: center; padding: 10px 14px; font-size: 0.95rem; font-weight: 500; color: #666; border-radius: 999px; cursor: pointer; transition: all .2s; user-select: none; }
  .tab.active { background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%); color: #fff; box-shadow: 0 2px 8px rgba(231,76,60,.3); }
  .tab:hover:not(.active) { color: #1a1a1a; }

  .meta { text-align: right; font-size: 0.72rem; color: #aaa; padding: 0 4px 10px; }

  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
  .pane { display: none; }
  .pane.active { display: block; }

  .filters { display: flex; gap: 6px; padding: 14px 18px; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 4px 14px; border-radius: 20px; border: 1px solid #e0e0e0; background: #fff; color: #666; cursor: pointer; font-size: 0.82rem; transition: all .15s; }
  .filter-btn.active { border-color: #e74c3c; color: #e74c3c; background: #fff5f5; font-weight: 500; }
  .filter-btn:hover:not(.active) { border-color: #ccc; color: #333; }
  .filter-sep { width: 100%; height: 0; }
  .filter-label { font-size: 0.78rem; color: #aaa; margin-right: 4px; }
  .sort-btn.active { border-color: #e67e22; color: #e67e22; background: #fff8f0; }

  .dates { font-size: 0.78rem; color: #999; padding: 8px 18px; background: #fafafa; border-bottom: 1px solid #f0f0f0; }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #fafafa; }
  th { padding: 10px 18px; text-align: left; font-size: 0.8rem; color: #999; font-weight: 500; border-bottom: 1px solid #f0f0f0; }
  td { padding: 12px 18px; border-bottom: 1px solid #f5f5f5; font-size: 0.88rem; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .stock-name { font-weight: 600; color: #1a1a1a; font-size: 0.92rem; }
  .stock-code { color: #aaa; font-size: 0.78rem; margin-top: 2px; }

  .count-badge { display: inline-block; background: #fff0f0; color: #e74c3c; font-weight: 700; font-size: 1rem; padding: 2px 10px; border-radius: 6px; }

  .appearances { display: flex; flex-wrap: wrap; gap: 6px; }
  .day-tag { display: inline-flex; align-items: center; gap: 4px; background: #f5f5f5; border-radius: 4px; padding: 3px 8px; font-size: 0.78rem; color: #666; }
  .day-tag .date { color: #999; }
  .zf-pos { color: #e74c3c; font-weight: 600; }
  .zf-neg { color: #27ae60; font-weight: 600; }
  .zf-zero { color: #999; }

  .empty { text-align: center; padding: 60px; color: #bbb; font-size: 0.9rem; }

  .jjyd-table td { padding: 10px 14px; font-size: 0.85rem; }
  .jjyd-table th { padding: 10px 14px; }
  .jjyd-table .money-up { color: #e74c3c; font-weight: 600; }
  .jjyd-table .money-down { color: #27ae60; font-weight: 600; }
  .jjyd-table .ban-tag { display: inline-block; background: #fff0e0; color: #d35400; font-size: 0.75rem; padding: 2px 7px; border-radius: 4px; font-weight: 500; white-space: nowrap; margin-top: 4px; }
  .jjyd-table .ban-tag.first { background: #e8f4ff; color: #2980b9; }
  .jjyd-table .ban-tag.lianban { background: #ffe8e8; color: #c0392b; }
  .jjyd-table .concept { color: #666; font-size: 0.78rem; line-height: 1.4; }
  .jjyd-table .pair { font-size: 0.78rem; color: #888; }
  .jjyd-table .pair .v1 { color: #1a1a1a; font-weight: 600; font-size: 0.85rem; }
  .jjyd-table .pct-jj { color: #f39c12; font-weight: 600; font-size: 0.82rem; }

  /* 大资金情绪 */
  .capital-hero { padding: 24px 20px; display: flex; align-items: center; gap: 24px; background: linear-gradient(180deg, #fafbfc 0%, #fff 100%); border-bottom: 1px solid #f0f0f0; }
  .temp-gauge { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
  .temp-gauge svg { transform: rotate(-90deg); }
  .temp-gauge .temp-num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .temp-gauge .temp-num .v { font-size: 1.9rem; font-weight: 700; line-height: 1; }
  .temp-gauge .temp-num .l { font-size: 0.7rem; color: #999; margin-top: 4px; }
  .capital-stats { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
  .capital-stats .stat { display: flex; flex-direction: column; gap: 2px; }
  .capital-stats .stat .label { font-size: 0.72rem; color: #999; }
  .capital-stats .stat .val { font-size: 0.95rem; font-weight: 600; color: #1a1a1a; }
  .signals { padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid #f0f0f0; background: #fafafa; }
  .signal { padding: 4px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
  .signal.warn { background: #fff0f0; color: #c0392b; border: 1px solid #ffe0e0; }
  .signal.ok { background: #ecfdf5; color: #16a34a; border: 1px solid #d1fae5; }
  .signal.neutral { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
  .signal .tip { color: #999; font-weight: 400; font-size: 0.7rem; margin-left: 2px; }
  .top-volume-table .industry { font-size: 0.78rem; color: #888; }
  .top-volume-table .rank { color: #bbb; font-size: 0.78rem; margin-right: 6px; }

  @media (max-width: 640px) {
    .tab { padding: 9px 8px; font-size: 0.9rem; }
    th, td { padding: 10px 12px; }
    .jjyd-table th, .jjyd-table td { padding: 8px 10px; }
    .jjyd-table .col-ltsz, .jjyd-table .col-fd { display: none; }
    .capital-hero { flex-direction: column; gap: 16px; padding: 18px 16px; }
    .capital-stats { width: 100%; }
    .top-volume-table .col-amp, .top-volume-table .col-hsl { display: none; }
  }
</style>
</head>

let activeDays = 3;

function render() {
  const window = tradingDays.slice(0, activeDays);
  const latest = window[0];

  const filtered = raw
    .map(s => {
      const zfMap = new Map(s.appearances.map(a => [a.date, a.zf]));
      const streak = [];
      for (const day of window) {
        if (!zfMap.has(day)) break;
        streak.push({ date: day, zf: zfMap.get(day) });
      }
      return { ...s, appearances: streak };
    })
    .filter(s => s.appearances.length >= 2 && s.appearances[0].date === latest)
    .sort((a, b) => b.appearances.length - a.appearances.length);

  const days = [...new Set(filtered.flatMap(s => s.appearances.map(a => a.date)))].sort();
  document.getElementById('dates').textContent = days.length ? '统计区间：' + days.join(' / ') : '';

  if (!filtered.length) {
    document.getElementById('content').innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }

  const rows = filtered.map(s => {
    const tags = s.appearances.map(a => {
      const zf = parseFloat(a.zf);
      const cls = zf > 0 ? 'zf-pos' : zf < 0 ? 'zf-neg' : 'zf-zero';
      return `<span class="day-tag"><span class="date">${a.date.slice(5)}</span><span class="${cls}">${zf > 0 ? '+' : ''}${a.zf}%</span></span>`;
    }).join('');
    return `<tr>
      <td><div class="stock-name">${s.name}</div><div class="stock-code">${s.code}</div></td>
      <td><span class="count-badge">连${s.appearances.length}天</span></td>
      <td><div class="appearances">${tags}</div></td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `<table>
    <thead><tr><th>股票</th><th>连续上榜</th><th>连续涨跌幅</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

document.querySelectorAll('.lhb-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lhb-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeDays = parseInt(btn.dataset.days);
    render();
  });
});

render();

let jjydMode = 'all';
let jjydSort = 'zhuli';

function sortKey(s, key) {
  const v = s[key];
  if (v === 'none' || v === null || v === undefined || v === '') return -Infinity;
  const n = Number(v);
  return isNaN(n) ? -Infinity : n;
}

function fmtYuan(v) {
  v = Number(v) || 0;
  const abs = Math.abs(v);
  if (abs >= 1e8) return (v / 1e8).toFixed(1) + '亿';
  if (abs >= 1e4) return Math.round(v / 1e4) + '万';
  return v.toString();
}
function fmtWan(v) {
  v = Number(v) || 0;
  const abs = Math.abs(v);
  if (abs >= 1e4) return (v / 1e4).toFixed(1) + '亿';
  return Math.round(v) + '万';
}
function banClass(ban) {
  if (!ban) return '';
  if (/首板/.test(ban)) return 'first';
  if (/连板|天.板/.test(ban)) return 'lianban';
  return '';
}
function lianbanCount(ban) {
  if (!ban) return 0;
  let m = ban.match(/(\d+)\s*连板/);
  if (m) return parseInt(m[1]);
  m = ban.match(/(\d+)\s*天\s*(\d+)\s*板/);
  if (m) return parseInt(m[2]);
  if (/首板/.test(ban)) return 1;
  return 0;
}

function renderJjyd() {
  let list = jjydRaw.slice();
  if (jjydMode === 'lianban') {
    list = list.filter(s => lianbanCount(s.ban) >= 2);
  } else if (jjydMode === 'shouban') {
    list = list.filter(s => /首板/.test(s.ban || ''));
  }
  list.sort((a, b) => sortKey(b, jjydSort) - sortKey(a, jjydSort));

  const sortLabels = { zhuli: '主力净额', weimai: '委买', cuohe: '撮合', jjzf: '竞价涨幅', fengdan: '封单' };
  const summary = document.getElementById('jjyd-summary');
  const content = document.getElementById('jjyd-content');
  summary.textContent = list.length ? `共 ${list.length} 只，按${sortLabels[jjydSort]}降序` : '';

  if (!list.length) {
    content.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }

  const rows = list.map(s => {
    const zf = Number(s.zf);
    const zfCls = zf > 0 ? 'money-up' : zf < 0 ? 'money-down' : '';
    const jjzfRaw = s.jjzf;
    let jjzfHtml = '';
    if (jjzfRaw !== 'none' && jjzfRaw !== null && jjzfRaw !== undefined) {
      const jv = Number(jjzfRaw);
      jjzfHtml = `<div class="pct-jj">竞${jv > 0 ? '+' : ''}${jjzfRaw}%</div>`;
    }
    const zfHtml = `<div class="${zfCls}">${zf > 0 ? '+' : ''}${s.zf}%</div>`;

    const zhuli = Number(s.zhuli) || 0;
    const zhuliCls = zhuli > 0 ? 'money-up' : zhuli < 0 ? 'money-down' : '';
    const zhuliText = zhuli ? fmtYuan(zhuli) : '--';

    const banCls = banClass(s.ban);
    const banHtml = s.ban ? `<span class="ban-tag ${banCls}">${s.ban}</span>` : '';

    return `<tr>
      <td>
        <div class="stock-name">${s.name}</div>
        <div class="stock-code">${s.code}</div>
        ${banHtml}
      </td>
      <td>${jjzfHtml}${zfHtml}</td>
      <td><div class="pair"><span class="v1">${fmtYuan(s.weimai)}</span><br>${fmtYuan(s.cuohe)}</div></td>
      <td><span class="${zhuliCls}">${zhuliText}</span></td>
      <td class="col-fd">${s.fengdan ? fmtWan(s.fengdan) : '--'}</td>
      <td class="col-ltsz">${fmtYuan(s.ltsz)}</td>
      <td><div class="concept">${(s.concept || '').replace('、', '<br>')}</div></td>
    </tr>`;
  }).join('');

  content.innerHTML = `<table class="jjyd-table">
    <thead><tr>
      <th>股票/板</th>
      <th>竞价/现价</th>
      <th>委买/撮合</th>
      <th>主力</th>
      <th class="col-fd">封单</th>
      <th class="col-ltsz">流通</th>
      <th>概念</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function tempColor(t) {
  if (t >= 65) return '#e74c3c';
  if (t <= 35) return '#27ae60';
  return '#f39c12';
}

function renderCapital() {
  const hasData = topVolume.length > 0 && capitalSignals.temp != null;
  const t = hasData ? capitalSignals.temp : 50;
  const arcLen = 301.6; // 2 * PI * 48
  const arc = document.getElementById('temp-arc');
  arc.setAttribute('stroke', hasData ? tempColor(t) : '#ddd');
  arc.setAttribute('stroke-dashoffset', hasData ? arcLen * (1 - t / 100) : arcLen);

  const tv = document.getElementById('temp-value');
  tv.textContent = hasData ? t : '--';
  tv.style.color = hasData ? tempColor(t) : '#bbb';

  const up = capitalSignals.up_count || 0;
  const down = capitalSignals.down_count || 0;
  const flat = capitalSignals.flat_count || 0;
  const ratio = down > 0 ? (up / down).toFixed(2) : (up ? '∞' : '0');
  document.getElementById('cap-rg').innerHTML = `<span class="money-up">${up}红</span> / <span class="money-down">${down}绿</span>${flat ? ` · ${flat}平` : ''} <span style="color:#999;font-weight:400;font-size:0.78rem;">(${ratio})</span>`;

  const avg = capitalSignals.avg_zf ?? 0;
  const avgCls = avg > 0 ? 'money-up' : avg < 0 ? 'money-down' : '';
  document.getElementById('cap-avg').innerHTML = `<span class="${avgCls}">${avg > 0 ? '+' : ''}${avg}%</span>`;

  document.getElementById('cap-turn').textContent = fmtYuan(capitalSignals.sum_turnover || 0);

  const zhuli = capitalSignals.sum_zhuli || 0;
  const zCls = zhuli > 0 ? 'money-up' : zhuli < 0 ? 'money-down' : '';
  document.getElementById('cap-zhuli').innerHTML = `<span class="${zCls}">${zhuli >= 0 ? '+' : '-'}${fmtYuan(Math.abs(zhuli))}</span>`;

  const sigBox = document.getElementById('cap-signals');
  const sigs = capitalSignals.signals || [];
  sigBox.innerHTML = sigs.map(s => `<span class="signal ${s.type}">${s.label}${s.tip ? `<span class="tip">${s.tip}</span>` : ''}</span>`).join('');

  const tbody = topVolume.map((s, i) => {
    const zf = Number(s.zf) || 0;
    const zfCls = zf > 0 ? 'money-up' : zf < 0 ? 'money-down' : '';
    const zhuli = Number(s.zhuli) || 0;
    const zCls = zhuli > 0 ? 'money-up' : zhuli < 0 ? 'money-down' : '';
    return `<tr>
      <td><span class="rank">${i + 1}</span><span class="stock-name">${s.name}</span><div class="stock-code">${s.code}</div></td>
      <td><span class="${zfCls}">${zf > 0 ? '+' : ''}${zf}%</span></td>
      <td>${fmtYuan(s.turnover)}</td>
      <td><span class="${zCls}">${zhuli ? (zhuli >= 0 ? '+' : '-') + fmtYuan(Math.abs(zhuli)) : '--'}</span></td>
      <td class="col-hsl">${s.hsl != null ? s.hsl + '%' : '--'}</td>
      <td class="col-amp">${s.amp != null ? s.amp + '%' : '--'}</td>
      <td><div class="industry">${s.industry || ''}</div></td>
    </tr>`;
  }).join('');

  document.getElementById('capital-content').innerHTML = topVolume.length
    ? `<table class="top-volume-table">
        <thead><tr>
          <th>股票</th><th>涨幅</th><th>成交额</th><th>主力净额</th>
          <th class="col-hsl">换手</th><th class="col-amp">振幅</th><th>行业</th>
        </tr></thead>
        <tbody>${tbody}</tbody>
      </table>`
    : '<div class="empty">暂无数据（盘前/休市时段或抓取失败）</div>';
}

renderCapital();
